<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국도로공사 교통량 모니터링 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{--bg:#f0f7ff;--panel:#ffffff;--border:#cde4f5;--accent:#0ea5e9;--accent2:#38bdf8;--text:#1e3a5f;--muted:#64869e;--warn:#f59e0b;--danger:#ef4444;--blue:#0ea5e9;--purple:#8b5cf6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Malgun Gothic","Segoe UI",sans-serif;font-size:14px;}
header{background:linear-gradient(90deg,#0369a1,#0ea5e9);padding:18px 32px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #38bdf855;box-shadow:0 2px 12px #0ea5e922;}
header .logo{font-size:22px;font-weight:800;letter-spacing:-0.5px;color:#fff;}
header .logo span{color:#bae6fd;}
header .subtitle{color:#e0f2fe;font-size:12px;margin-top:2px;}
header .badge{margin-left:auto;background:#ffffff22;border:1px solid #bae6fd;color:#e0f2fe;padding:4px 12px;border-radius:20px;font-size:11px;}
.main{padding:20px 24px;max-width:1440px;margin:0 auto;}
.filter-bar{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:20px;box-shadow:0 2px 8px #0ea5e911;}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-group label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.filter-group select{background:#f0f9ff;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;outline:none;min-width:150px;}
.filter-group select:focus{border-color:var(--accent);}
.btn-reset{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 16px;cursor:pointer;font-size:13px;transition:.2s;}
.btn-reset:hover{border-color:var(--accent);color:var(--accent);background:#f0f9ff;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:0 2px 8px #0ea5e90d;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-color,var(--accent));}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.kpi-value{font-size:28px;font-weight:800;line-height:1;color:var(--text);}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px;}
.charts-row{display:grid;gap:14px;margin-bottom:20px;}
.charts-row.two{grid-template-columns:2fr 1fr;}
.charts-row.half{grid-template-columns:1fr 1fr;}
.chart-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:0 2px 8px #0ea5e90d;}
.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.chart-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.table-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px #0ea5e90d;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid #e0f2fe;transition:background .15s;}
tbody tr:hover{background:#f0f9ff;}
tbody td{padding:10px 12px;font-size:13px;}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:800;}
.rank-1{background:#f59e0b;color:#fff;}
.rank-2{background:#94a3b8;color:#fff;}
.rank-3{background:#d97706;color:#fff;}
.rank-4,.rank-5{background:#e0f2fe;color:var(--text);border:1px solid var(--border);}
.speed-bar{display:flex;align-items:center;gap:8px;}
.speed-track{flex:1;background:#e0f2fe;border-radius:4px;height:6px;}
.speed-fill{height:6px;border-radius:4px;}
.warn-section{margin-bottom:20px;}
.warn-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--text);}
.warn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.warn-card{border-radius:10px;padding:14px 16px;border-left:4px solid;display:flex;flex-direction:column;gap:4px;}
.warn-card.critical{background:#fef2f2;border-color:var(--danger);}
.warn-card.warning{background:#fffbeb;border-color:var(--warn);}
.warn-card.info{background:#f0f9ff;border-color:var(--blue);}
.warn-route{font-size:12px;font-weight:700;color:var(--text);}
.warn-msg{font-size:12px;color:var(--muted);}
.warn-val{font-size:18px;font-weight:800;margin-top:4px;}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.charts-row.two,.charts-row.half{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">&#x1F6E3; <span>한국도로공사</span> 교통량 모니터링 대시보드</div>
    <div class="subtitle">노선별 · 시간대별 교통량 분석 | 데이터 기간: 2026.04.01 ~ 2026.04.07</div>
  </div>
  <div class="badge">DASHBOARD v1.0</div>
</header>

<div class="main">

  <div class="filter-bar">
    <div class="filter-group">
      <label>노선 선택</label>
      <select id="selRoute">
        <option value="ALL">전체 노선</option>
        <option>경부고속도로</option>
        <option>남해고속도로</option>
        <option>서해안고속도로</option>
        <option>영동고속도로</option>
        <option>중부고속도로</option>
      </select>
    </div>
    <div class="filter-group">
      <label>시간대 선택</label>
      <select id="selHour"><option value="ALL">전체 시간대</option></select>
    </div>
    <div class="filter-group">
      <label>차종 선택</label>
      <select id="selType">
        <option value="ALL">전체 차종</option>
        <option>승용차</option><option>소형화물</option>
        <option>중형화물</option><option>대형화물</option><option>버스</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetFilters()">&#x21BA; 필터 초기화</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card" style="--accent-color:#2ea043">
      <div class="kpi-label">총 교통량</div>
      <div class="kpi-value" id="kpiTotal">-</div>
      <div class="kpi-sub">대 (필터 기준)</div>
    </div>
    <div class="kpi-card" style="--accent-color:#388bfd">
      <div class="kpi-label">평균 속도</div>
      <div class="kpi-value" id="kpiSpeed">-</div>
      <div class="kpi-sub">km/h (전체 평균)</div>
    </div>
    <div class="kpi-card" style="--accent-color:#d29922">
      <div class="kpi-label">최다 교통 시간대</div>
      <div class="kpi-value" id="kpiPeakHour" style="font-size:22px">-</div>
      <div class="kpi-sub" id="kpiPeakVol"></div>
    </div>
    <div class="kpi-card" style="--accent-color:#f85149">
      <div class="kpi-label">최저 속도 시간대</div>
      <div class="kpi-value" id="kpiSlowHour" style="font-size:22px">-</div>
      <div class="kpi-sub" id="kpiSlowSpeed"></div>
    </div>
  </div>

  <div class="charts-row two">
    <div class="chart-card">
      <div class="chart-title"><div class="dot"></div>시간대별 총 교통량</div>
      <canvas id="chartHour" height="200"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title"><div class="dot" style="background:#bc8cff"></div>차종별 교통량 비율</div>
      <canvas id="chartType" height="200"></canvas>
    </div>
  </div>

  <div class="charts-row half">
    <div class="chart-card">
      <div class="chart-title"><div class="dot" style="background:#388bfd"></div>요일별 교통량 추이 (노선별)</div>
      <canvas id="chartDay" height="220"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title"><div class="dot" style="background:#d29922"></div>노선별 평균 속도 (km/h)</div>
      <canvas id="chartSpeed" height="220"></canvas>
    </div>
  </div>

  <div class="table-card">
    <div class="chart-title"><div class="dot" style="background:#f85149"></div>정체 시간대 Top 5 (최저 평균속도 기준)</div>
    <table>
      <thead>
        <tr><th>순위</th><th>노선</th><th>날짜</th><th>시간대</th><th>평균속도</th><th>총 교통량</th></tr>
      </thead>
      <tbody id="top5Body"></tbody>
    </table>
  </div>

  <div class="warn-section">
    <div class="warn-title">&#x26A0;&#xFE0F; 통행량 급증 구간 경고</div>
    <div class="warn-grid" id="warnGrid"></div>
  </div>

</div>

  document.getElementById('kpiSpeed').textContent=avg;
  const byH={};
  HOURS.forEach(h=>byH[h]={vol:0,sp:[],});
  data.forEach(r=>{ byH[r[2]].vol+=r[4]; byH[r[2]].sp.push(r[5]); });
  let ph='',pv=0,sh='',ss=9999;
  HOURS.forEach(h=>{
    if(byH[h].vol>pv){pv=byH[h].vol;ph=h;}
    if(byH[h].sp.length){const a=byH[h].sp.reduce((x,y)=>x+y,0)/byH[h].sp.length; if(a<ss){ss=a;sh=h;}}
  });
  document.getElementById('kpiPeakHour').textContent=ph||'-';
  document.getElementById('kpiPeakVol').textContent=pv?pv.toLocaleString()+'대':'';
  document.getElementById('kpiSlowHour').textContent=sh||'-';
  document.getElementById('kpiSlowSpeed').textContent=sh?ss.toFixed(1)+' km/h':'';
}

function updateChartHour(data){
  const bh={};HOURS.forEach(h=>bh[h]=0);data.forEach(r=>bh[r[2]]+=r[4]);
  const vals=HOURS.map(h=>bh[h]);const mx=Math.max(...vals);
  const ctx=document.getElementById('chartHour');
  if(charts.hour)charts.hour.destroy();
  charts.hour=new Chart(ctx,{type:'bar',data:{labels:HOURS,datasets:[{label:'교통량(대)',data:vals,
    backgroundColor:vals.map(v=>v===mx?'#f43f5e99':'#0ea5e944'),
    borderColor:vals.map(v=>v===mx?'#f43f5e':'#0ea5e9'),borderWidth:1,borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>' '+c.parsed.y.toLocaleString()+'대'}},
      datalabels:{
        anchor:'end',align:'end',offset:2,
        color:ctx2=>vals[ctx2.dataIndex]===mx?'#f43f5e':'#0ea5e9',
        font:{size:9,weight:'600'},
        formatter:v=>v>=10000?(v/10000).toFixed(1)+'만':v.toLocaleString(),
      }},
    scales:{x:{ticks:{color:'#64869e',font:{size:10}},grid:{color:'#e0f2fe'}},
      y:{ticks:{color:'#64869e',font:{size:10},callback:v=>v.toLocaleString()},grid:{color:'#e0f2fe'},
        grace:'15%'}}},
    plugins:[ChartDataLabels]});
}

function updateChartType(data){
  const bt={};TYPES.forEach(t=>bt[t]=0);data.forEach(r=>bt[r[3]]=(bt[r[3]]||0)+r[4]);
  const ctx=document.getElementById('chartType');
  if(charts.type)charts.type.destroy();
  charts.type=new Chart(ctx,{type:'doughnut',data:{labels:TYPES,datasets:[{
    data:TYPES.map(t=>bt[t]),backgroundColor:TCOLORS,borderColor:'#161b22',borderWidth:2}]},
    options:{responsive:true,cutout:'65%',plugins:{
      legend:{position:'bottom',labels:{color:'#64869e',font:{size:11},boxWidth:12}},
      tooltip:{callbacks:{label:c=>' '+c.label+': '+c.parsed.toLocaleString()+'대'}}}}});
}

function updateChartDay(data){
  const grid={};
  ROUTES.forEach(r=>{grid[r]={};DATE_LIST.forEach(d=>grid[r][d]=0);});
  data.forEach(r=>{if(grid[r[1]])grid[r[1]][r[0]]+=r[4];});
  const selR=document.getElementById('selRoute').value;
  const active=selR==='ALL'?ROUTES:[selR];
  const ctx=document.getElementById('chartDay');
  if(charts.day)charts.day.destroy();
  charts.day=new Chart(ctx,{type:'line',
    data:{labels:DATE_LIST.map((d,i)=>DAYS[i]+'('+d.slice(5)+')'),
      datasets:active.map(route=>({label:route,
        data:DATE_LIST.map(d=>grid[route][d]),
        borderColor:RCOLORS[ROUTES.indexOf(route)],
        backgroundColor:RCOLORS[ROUTES.indexOf(route)]+'22',
        tension:0.4,fill:false,pointRadius:5,borderWidth:2}))},
    options:{responsive:true,plugins:{
      legend:{position:'bottom',labels:{color:'#64869e',font:{size:11},boxWidth:12}},
      tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+c.parsed.y.toLocaleString()+'대'}}},
    scales:{x:{ticks:{color:'#64869e',font:{size:10}},grid:{color:'#e0f2fe'}},
      y:{ticks:{color:'#64869e',font:{size:10},callback:v=>v.toLocaleString()},grid:{color:'#e0f2fe'}}}}});
}

function updateChartSpeed(data){
  const br={};ROUTES.forEach(r=>br[r]={s:0,c:0});
  data.forEach(r=>{br[r[1]].s+=r[5];br[r[1]].c++;});
  const avgs=ROUTES.map(r=>br[r].c?(br[r].s/br[r].c).toFixed(1):0);
  const ctx=document.getElementById('chartSpeed');
  if(charts.speed)charts.speed.destroy();
  charts.speed=new Chart(ctx,{type:'bar',
    data:{labels:ROUTES.map(r=>r.replace('고속도로','')),datasets:[{label:'평균속도(km/h)',
      data:avgs,backgroundColor:RCOLORS.map(c=>c+'88'),borderColor:RCOLORS,borderWidth:2,borderRadius:6}]},
    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>' '+c.parsed.x+' km/h'}}},
    scales:{x:{min:0,max:120,ticks:{color:'#64869e',font:{size:10}},grid:{color:'#e0f2fe'}},
      y:{ticks:{color:'#64869e',font:{size:11}},grid:{color:'#e0f2fe'}}}}});
}

function updateTop5(){
  const g={};
  RAW.forEach(r=>{
    const k=r[1]+'|'+r[0]+'|'+r[2];
    if(!g[k])g[k]={route:r[1],date:r[0],hour:r[2],sp:[],vol:0};
    g[k].sp.push(r[5]);g[k].vol+=r[4];
  });
  const rows=Object.values(g).map(x=>({...x,avg:x.sp.reduce((a,b)=>a+b,0)/x.sp.length}));
  rows.sort((a,b)=>a.avg-b.avg);
  const tbody=document.getElementById('top5Body');
  tbody.innerHTML='';
  rows.slice(0,5).forEach((r,i)=>{
    const pct=Math.min(100,r.avg/100*100);
    const col=r.avg<50?'#f85149':r.avg<70?'#d29922':'#2ea043';
    tbody.innerHTML+=`<tr>
      <td><span class="rank-badge rank-${i+1}">${i+1}</span></td>
      <td><strong>${r.route}</strong></td>
      <td>${r.date}</td>
      <td>${r.hour}</td>
      <td><div class="speed-bar">
        <span style="color:${col};font-weight:700;min-width:52px">${r.avg.toFixed(1)} km/h</span>
        <div class="speed-track"><div class="speed-fill" style="width:${pct}%;background:${col}"></div></div>
      </div></td>
      <td>${r.vol.toLocaleString()}대</td>
    </tr>`;
  });
}

function updateWarnings(){
  const alerts=[];
  ROUTES.forEach(route=>{
    DATE_LIST.forEach(date=>{
      let prev=null;
      HOURS.forEach(hour=>{
        const rows=RAW.filter(r=>r[1]===route&&r[0]===date&&r[2]===hour);
        const vol=rows.reduce((s,r)=>s+r[4],0);
        const speed=rows.length?rows.reduce((s,r)=>s+r[5],0)/rows.length:100;
        if(prev!==null&&prev>0){
          const ratio=(vol-prev)/prev*100;
          if(ratio>=60) alerts.push({route,date,hour,vol,ratio:ratio.toFixed(0),speed,level:'critical'});
          else if(ratio>=35) alerts.push({route,date,hour,vol,ratio:ratio.toFixed(0),speed,level:'warning'});
        }
        if(speed<45) alerts.push({route,date,hour,vol,speed,ratio:null,level:'critical',slow:true});
        prev=vol;
      });
    });
  });
  alerts.sort((a,b)=>({critical:0,warning:1}[a.level]||2)-({critical:0,warning:1}[b.level]||2));
  const grid=document.getElementById('warnGrid');
  grid.innerHTML='';
  if(!alerts.length){grid.innerHTML='<div style="color:#8b949e;padding:12px">현재 급증 구간 없음</div>';return;}
  alerts.slice(0,12).forEach(a=>{
    const icon=a.level==='critical'?'🔴':'🟡';
    const msg=a.slow?`속도 ${a.speed.toFixed(1)} km/h — 극심 정체`:`전 시간 대비 +${a.ratio}% 급증`;
    const col=a.level==='critical'?'#f85149':'#d29922';
    grid.innerHTML+=`<div class="warn-card ${a.level}">
      <div class="warn-route">${icon} ${a.route}</div>
      <div class="warn-msg">${a.date} ${a.hour} | ${msg}</div>
      <div class="warn-val" style="color:${col}">${a.vol.toLocaleString()} 대</div>
    </div>`;
  });
}

function render(){
  const d=getFiltered();
  updateKPI(d);updateChartHour(d);updateChartType(d);updateChartDay(d);updateChartSpeed(d);
  updateTop5();updateWarnings();
}

function resetFilters(){
  document.getElementById('selRoute').value='ALL';
  document.getElementById('selHour').value='ALL';
  document.getElementById('selType').value='ALL';
  render();
}

['selRoute','selHour','selType'].forEach(id=>
  document.getElementById(id).addEventListener('change',render));

render();
</script>
</body>
</html>
